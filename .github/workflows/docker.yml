# Builds the container image (see Dockerfile) and pushes it to Docker Hub as
# filipecabaco/supablock — the source of the quick-start:
#
#   docker run -it --rm --device /dev/fuse --cap-add SYS_ADMIN \
#     --security-opt apparmor=unconfined \
#     -v supablock-config:/root/.config/supablock filipecabaco/supablock
#
# Pushes to main refresh :latest; tag pushes (v*) add :X.Y.Z and :X.Y.
# Each architecture builds natively (no QEMU — emulating the Erlang compile
# would be painfully slow), is smoke-tested, pushed by digest, and a final
# job stitches the digests into one multi-arch manifest.
#
# Required repo secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN (a Docker Hub
# access token with Read & Write scope).

name: docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  IMAGE: filipecabaco/supablock
  # Push only from main and version tags; a workflow_dispatch on any other
  # branch still builds and smoke-tests, without touching Docker Hub.
  PUSH: ${{ startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' }}

# Newest main push wins; tag builds are never cancelled.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # linux/arm64 -> linux-arm64: usable in artifact names and cache scopes.
      - name: Prepare platform slug
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_SLUG=${platform//\//-}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: env.PUSH == 'true'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image (local, for the smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          tags: supablock:smoke
          cache-from: type=gha,scope=${{ env.PLATFORM_SLUG }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_SLUG }}

      # `help` boots the bundled ERTS, proving the runtime stage has every
      # shared library the release needs. `doctor` reports rather than gates:
      # /dev/fuse is legitimately absent on the runner.
      - name: Smoke test
        run: |
          docker run --rm supablock:smoke help
          docker run --rm supablock:smoke doctor || true

      - name: Report image size
        run: |
          size=$(docker image inspect supablock:smoke --format '{{.Size}}')
          echo "Image size: $((size / 1000000)) MB ($size bytes)"
          docker history --format 'table {{.Size}}\t{{.CreatedBy}}' supablock:smoke | head -15

      # End-to-end, agent mode: the real image reads a stub Management API on
      # the runner loopback via ls/cat — no FUSE device, no capabilities, the
      # exact command an AI agent runs. Also asserts the unauthenticated
      # failure mode (exit 2 + hint), which agents branch on.
      - name: E2E — agent mode (ls/cat, no FUSE flags)
        run: |
          python3 docker/e2e/stub_api.py 54321 &
          stub=$!
          trap 'kill $stub' EXIT
          for _i in $(seq 1 50); do
            curl -fsS http://127.0.0.1:54321/v1/organizations >/dev/null && break
            sleep 0.1
          done

          run() {
            docker run --rm --network host \
              -e SUPABLOCK_TOKEN=sbp_STUBSTUBSTUBSTUBSTUBSTUBSTUBSTUBSTUB \
              -e SUPABLOCK_API_URL=http://127.0.0.1:54321 \
              supablock:smoke "$@"
          }

          test "$(run ls)" = "organizations"
          run ls organizations | tee orgs.out
          grep -qx "org-alpha" orgs.out
          grep -qx "org-beta" orgs.out

          run cat organizations/org-alpha/projects/projaone1234567890ab/health | tee health.out
          grep -qx "auth: healthy" health.out
          grep -qx "realtime: unhealthy (UNHEALTHY)" health.out

          run cat organizations/org-alpha/projects/nope 2>err.out && exit 1 || test $? = 1
          grep -q "No such path" err.out

          docker run --rm supablock:smoke ls organizations 2>noauth.out && exit 1 || test $? = 2
          grep -q "Not authenticated" noauth.out

      # End-to-end, mounted mode: the full entrypoint flow — credential check
      # (satisfied by SUPABLOCK_TOKEN), background mount, wait, then the given
      # command runs at the mountpoint over a real FUSE mount inside the
      # container. GitHub-hosted runners expose /dev/fuse.
      - name: E2E — mounted mode (FUSE inside the container)
        run: |
          python3 docker/e2e/stub_api.py 54322 &
          stub=$!
          trap 'kill $stub' EXIT
          for _i in $(seq 1 50); do
            curl -fsS http://127.0.0.1:54322/v1/organizations >/dev/null && break
            sleep 0.1
          done

          docker run --rm --network host \
            --device /dev/fuse --cap-add SYS_ADMIN --security-opt apparmor=unconfined \
            -e SUPABLOCK_TOKEN=sbp_STUBSTUBSTUBSTUBSTUBSTUBSTUBSTUBSTUB \
            -e SUPABLOCK_API_URL=http://127.0.0.1:54322 \
            supablock:smoke \
            sh -c 'pwd && ls organizations && cat organizations/org-alpha/projects/*/health' \
            | tee mount.out

          grep -qx "/supabase" mount.out
          grep -qx "org-alpha" mount.out
          grep -qx "auth: healthy" mount.out

      - name: Push by digest
        id: push
        if: env.PUSH == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.PLATFORM_SLUG }}

      - name: Export digest
        if: env.PUSH == 'true'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        if: env.PUSH == 'true'
        with:
          name: digests-${{ env.PLATFORM_SLUG }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push the multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Inspect the pushed image
        run: docker buildx imagetools inspect "${{ env.IMAGE }}:${{ steps.meta.outputs.version }}"
