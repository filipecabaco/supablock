# TEMPORARY branch-only variant: creates a tag ref using the workflow
# token, because this session's git access cannot push tags. Dispatched
# once on this branch, which is deleted afterwards — the real
# npm-publish.yml is untouched on main. Same path/trigger as the
# registered workflow so workflow_dispatch accepts it on this ref.
name: npm-publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create (e.g. v0.4.0)"
        required: true
      sha:
        description: "Commit SHA the tag should point at"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Create tag ref
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha="${{ inputs.sha }}"
          gh api "repos/$GITHUB_REPOSITORY/git/refs" \
            -f ref="refs/tags/${{ inputs.tag }}" \
            -f sha="$sha"
