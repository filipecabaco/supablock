# Builds the single-file Burrito binaries per platform and publishes them as
# GitHub release assets — the download source for the one-line installer:
#
#   curl -fsSL https://filipecabaco.github.io/supablock/install.sh | sh
#
# Tag pushes (v*) publish a versioned release; pushes to the default branch
# refresh the rolling "canary" prerelease, so the installer works before any
# stable tag exists.
#
# The Linux binaries statically link libfuse3 (the Makefile's default when
# libfuse3.a is present): they need no FUSE package on the target machine
# beyond the kernel module and, for non-root mounts, fusermount3 — both ship
# with every mainstream distro. The macOS binaries link the macFUSE dylib
# dynamically: the kernel side of macFUSE cannot be bundled (Apple requires
# the user to install and approve it), so the dylib that comes with that
# install is the correct runtime dependency.

name: release

on:
  push:
    tags: ["v*"]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# macOS runners are scarce: without this, branch pushes pile up runs that
# all wait hours for the same queue. Newest push wins; tag builds are never
# cancelled (their group is the unique tag ref).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  MIX_ENV: prod
  # Baked into the binary at compile time (Supablock.OAuth): the released
  # supablock OAuth app identity, so `supablock login` works with zero
  # configuration. Empty (repo secrets unset) simply falls back to the
  # dashboard session flow — nothing breaks.
  SUPABLOCK_OAUTH_CLIENT_ID: ${{ secrets.SUPABLOCK_OAUTH_CLIENT_ID }}
  SUPABLOCK_OAUTH_CLIENT_SECRET: ${{ secrets.SUPABLOCK_OAUTH_CLIENT_SECRET }}

jobs:
  linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # libfuse for the port; the rest are kerl's requirements for the
      # Erlang source build mise performs (cached across runs).
      - name: Install FUSE and Erlang build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse3-dev fuse3 pkg-config xz-utils \
            build-essential autoconf m4 libssl-dev libncurses-dev

      # Installs the whole toolchain (Erlang, Elixir, Zig) from mise.toml.
      - uses: jdx/mise-action@v2
        with:
          cache: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      # Burrito's wrapper caches the unpacked payload under a directory keyed
      # by the app version and reuses it whenever the key matches, so every
      # published binary needs a unique version — otherwise an upgraded
      # binary silently keeps running the previously unpacked code. Tags use
      # the tag's version; canary builds get a per-commit prerelease version.
      - name: Set build version
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            echo "SUPABLOCK_BUILD_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "SUPABLOCK_BUILD_VERSION=0.1.0-canary.${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"
          fi

      - name: Build single-file binary
        run: |
          mix deps.get
          mix release supablock_burrito

      - name: Sanity-check the binary
        run: |
          BIN=burrito_out/supablock_burrito_native
          "$BIN" help
          "$BIN" doctor || true
          mv "$BIN" "supablock-linux-${{ matrix.arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: supablock-linux-${{ matrix.arch }}
          path: supablock-linux-${{ matrix.arch }}

  # One macOS job, arm64 only: Macs have been arm-only since 2020, and macOS
  # runner capacity is the scarce resource (macos-13 was retired — jobs
  # targeting it queued forever, starving the publish job — and macos-14
  # entered deprecation on 2026-07-06 with hours-long queues; macos-15 is the
  # current macos-latest fleet). Intel-Mac users build from source; the
  # installer says so.
  macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      # macFUSE installs headers + the libfuse dylib (2.9 API); the kext
      # itself is not loadable in CI, but linking does not need it. The rest
      # are kerl's requirements for the Erlang source build mise performs
      # (cached across runs).
      - name: Install macFUSE and build dependencies
        run: |
          brew install --cask macfuse
          brew install pkg-config xz autoconf openssl@3

      # Installs the whole toolchain (Erlang, Elixir, Zig) from mise.toml.
      - uses: jdx/mise-action@v2
        with:
          cache: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      # Same reasoning as the linux job: a unique per-build version keeps the
      # Burrito wrapper from reusing a stale unpacked payload after upgrade.
      - name: Set build version
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            echo "SUPABLOCK_BUILD_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "SUPABLOCK_BUILD_VERSION=0.1.0-canary.${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"
          fi

      - name: Build single-file binary
        run: |
          mix deps.get
          mix release supablock_burrito

      - name: Sanity-check the binary
        run: |
          BIN=burrito_out/supablock_burrito_native
          "$BIN" help
          mv "$BIN" "supablock-macos-${{ matrix.arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: supablock-macos-${{ matrix.arch }}
          path: supablock-macos-${{ matrix.arch }}

  # One publish job (instead of per-matrix uploads) so concurrent jobs never
  # race creating the same release. Runs even if a platform failed, shipping
  # whatever was built.
  publish:
    needs: [linux, macos]
    # Compare against the literal ref: the event payload's default_branch
    # proved stale during a branch rename, silently skipping publish.
    if: always() && (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: supablock-*
          merge-multiple: true

      - name: List built binaries
        run: ls -la dist/

      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

      - name: Refresh canary prerelease
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: canary
          name: canary (rolling)
          prerelease: true
          make_latest: false
          body: |
            Rolling build of the default branch (${{ github.sha }}).
            Install with:

                curl -fsSL https://filipecabaco.github.io/supablock/install.sh | sh
          files: dist/*
