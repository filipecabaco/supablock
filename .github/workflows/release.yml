# Builds the single-file Burrito binaries per platform and publishes them as
# GitHub release assets — the download source for the one-line installer:
#
#   curl -fsSL https://filipecabaco.github.io/supablock/install.sh | sh
#
# Tag pushes (v*) publish a versioned release; pushes to the default branch
# refresh the rolling "canary" prerelease, so the installer works before any
# stable tag exists.
#
# The Linux binaries statically link libfuse3 (the Makefile's default when
# libfuse3.a is present): they need no FUSE package on the target machine
# beyond the kernel module and, for non-root mounts, fusermount3 — both ship
# with every mainstream distro. The macOS binaries link the macFUSE dylib
# dynamically: the kernel side of macFUSE cannot be bundled (Apple requires
# the user to install and approve it), so the dylib that comes with that
# install is the correct runtime dependency.

name: release

on:
  push:
    tags: ["v*"]
    branches: [main, master, "claude/superblock-fuse-fs-uye3jn"]
  workflow_dispatch:

permissions:
  contents: write

env:
  MIX_ENV: prod
  # Baked into the binary at compile time (Superblock.OAuth): the released
  # superblock OAuth app identity, so `superblock login` works with zero
  # configuration. Empty (repo secrets unset) simply falls back to the
  # dashboard session flow — nothing breaks.
  SUPERBLOCK_OAUTH_CLIENT_ID: ${{ secrets.SUPERBLOCK_OAUTH_CLIENT_ID }}
  SUPERBLOCK_OAUTH_CLIENT_SECRET: ${{ secrets.SUPERBLOCK_OAUTH_CLIENT_SECRET }}

jobs:
  linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      # libfuse for the port; the rest are kerl's requirements for the
      # Erlang source build mise performs (cached across runs).
      - name: Install FUSE and Erlang build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse3-dev fuse3 pkg-config xz-utils \
            build-essential autoconf m4 libssl-dev libncurses-dev

      # Installs the whole toolchain (Erlang, Elixir, Zig) from mise.toml.
      - uses: jdx/mise-action@v2
        with:
          cache: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build single-file binary
        run: |
          mix deps.get
          mix release superblock_burrito

      - name: Sanity-check the binary
        run: |
          BIN=burrito_out/superblock_burrito_native
          "$BIN" help
          "$BIN" doctor || true
          mv "$BIN" "superblock-linux-${{ matrix.arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: superblock-linux-${{ matrix.arch }}
          path: superblock-linux-${{ matrix.arch }}

  macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            arch: x86_64
          - runner: macos-14
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      # macFUSE installs headers + the libfuse dylib (2.9 API); the kext
      # itself is not loadable in CI, but linking does not need it. The rest
      # are kerl's requirements for the Erlang source build mise performs
      # (cached across runs).
      - name: Install macFUSE and build dependencies
        run: |
          brew install --cask macfuse
          brew install pkg-config xz autoconf openssl@3

      # Installs the whole toolchain (Erlang, Elixir, Zig) from mise.toml.
      - uses: jdx/mise-action@v2
        with:
          cache: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build single-file binary
        run: |
          mix deps.get
          mix release superblock_burrito

      - name: Sanity-check the binary
        run: |
          BIN=burrito_out/superblock_burrito_native
          "$BIN" help
          mv "$BIN" "superblock-macos-${{ matrix.arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: superblock-macos-${{ matrix.arch }}
          path: superblock-macos-${{ matrix.arch }}

  # One publish job (instead of per-matrix uploads) so concurrent jobs never
  # race creating the same release. Runs even if a platform failed, shipping
  # whatever was built.
  publish:
    needs: [linux, macos]
    if: always() && (startsWith(github.ref, 'refs/tags/') || github.ref_name == github.event.repository.default_branch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: superblock-*
          merge-multiple: true

      - name: List built binaries
        run: ls -la dist/

      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

      - name: Refresh canary prerelease
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: canary
          name: canary (rolling)
          prerelease: true
          make_latest: false
          body: |
            Rolling build of the default branch (${{ github.sha }}).
            Install with:

                curl -fsSL https://filipecabaco.github.io/supablock/install.sh | sh
          files: dist/*
