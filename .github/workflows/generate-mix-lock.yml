name: generate-mix-lock

on:
  push:
    branches:
      - copilot/add-mix-lock-file
    paths-ignore:
      - mix.lock

jobs:
  generate:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse3-dev fuse3 pkg-config \
            build-essential autoconf m4 libssl-dev libncurses-dev

      - uses: jdx/mise-action@v2
        with:
          cache: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Generate mix.lock
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Commit mix.lock
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mix.lock
          git diff --staged --quiet || git commit -m "Generate mix.lock via mix deps.get"
          git push
