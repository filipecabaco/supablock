# Publishes the npm packages for an EXISTING GitHub release, reusing its
# binaries as-is. The release workflow already publishes npm on every tag
# push; this exists for releases that predate the npm channel (or a publish
# that failed after the release went out) — run it with the tag to backfill.
name: npm-publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag whose assets to publish to npm (e.g. v0.3.0)"
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download "${{ inputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" --pattern 'supablock-*' --dir dist
          ls -la dist/

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          TAG="${{ inputs.tag }}"
          ./npm/publish.sh "${TAG#v}" dist
