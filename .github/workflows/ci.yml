# Test CI: unit tests on every push/PR, plus a heavier end-to-end job that
# drives the released binary through a real FUSE mount and cross-checks it
# against the official `supabase` CLI (Management API tree) and a real
# Postgres (the `database/` row tree).
name: ci

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast gate: format + the default suite (FUSE/e2e excluded).
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # libfuse3 is needed even for unit tests: the efuse C port is compiled
      # as part of `mix compile`. The rest are kerl's Erlang-source-build deps.
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse3-dev fuse3 pkg-config \
            build-essential autoconf m4 libssl-dev libncurses-dev

      - uses: jdx/mise-action@v2
        with:
          cache: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Fetch deps
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Unit tests
        run: mix test

  # End-to-end: released binary + real FUSE mount, cross-checked against the
  # supabase CLI and a real Postgres. GitHub-hosted runners expose /dev/fuse
  # and allow non-root fusermount3 mounts, so no privileged container is
  # needed.
  e2e:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # The database/ tree connects straight to the Postgres service; both the
      # FUSE-level and released-binary e2e tests pick these up.
      SUPERBLOCK_TEST_DB_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
      SUPERBLOCK_E2E_DB_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse3-dev fuse3 pkg-config postgresql-client \
            build-essential autoconf m4 libssl-dev libncurses-dev

      - uses: jdx/mise-action@v2
        with:
          cache: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      # The official CLI, so the e2e cross-check runs against the same tool
      # users have (Management API tree: orgs/projects listings).
      - name: Install the supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Fetch deps
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      # The e2e suite drives the released binary, so it must exist first.
      - name: Build the release
        run: MIX_ENV=prod mix release

      - name: Sanity-check FUSE, the CLI, and the release
        run: |
          test -c /dev/fuse && echo "/dev/fuse present"
          fusermount3 --version || fusermount --version
          supabase --version
          psql "$SUPERBLOCK_E2E_DB_URL" -c 'select 1' >/dev/null && echo "postgres reachable"
          # The release must ship the compiled FUSE port, or every mount fails.
          port=$(echo _build/prod/rel/superblock/lib/efuse-*/priv/efuse)
          test -x "$port" && echo "efuse port present: $port"

      # FUSE mounts (database/ row tree over the real Postgres) + the released
      # binary e2e (Management API tree vs the supabase CLI; database/ rows vs
      # the seeded database).
      - name: FUSE + e2e tests
        run: mix test --include fuse --include e2e
